name: Staging

on:
  workflow_dispatch:
  push:
    branches:
      - staging

concurrency:
  group: landing-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-staging:
    name: Validate landing staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
